spring:
  application:
    name: minhan-hrm-api
  datasource:
    url: jdbc:mysql://localhost:3307/minhan_hrm?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 20MB
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: always

minhan:
  hrm:
    cors:
      allowed-origins: "http://localhost:5173,http://localhost:3000"
    jwt:
      secret: ${JWT_SECRET:change-me-in-production-use-long-random-secret-key-min-256-bits}
      expiration-ms: 86400000
    upload:
      dir: ${UPLOAD_DIR:./data/uploads}
    import:
      default-employee-password: ${IMPORT_DEFAULT_PASSWORD:Minhan@123}

logging:
  level:
    root: INFO
    com.minhan.hrm: DEBUG
    org.springframework.security: INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
